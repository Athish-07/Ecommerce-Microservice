server:
  port: 8082

spring:
  application:
    name: product-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  datasource:
    url: ${PRODUCT_DB_URL:jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true}
    username: ${PRODUCT_DB_USERNAME:root}
    password: ${PRODUCT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: false
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000
            loggerLevel: basic

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: ${LOG_ROOT:../logs}/product-service.log
  level:
    root: INFO
    com.example: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [corr:%X{correlationId}] [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [corr:%X{correlationId}] [%thread] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROOT:../logs}/product-service.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB

jwt:
  public-key: ${JWT_PUBLIC_KEY}
