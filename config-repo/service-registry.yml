server:
  port: 8761

spring:
  application:
    name: service-registry

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

logging:
  file:
    name: ${LOG_ROOT:../logs}/service-registry.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROOT:../logs}/service-registry.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
