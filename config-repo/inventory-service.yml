server:
  port: 8084

spring:
  application:
    name: inventory-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2
          max-interval: 5000
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true}
    username: ${INVENTORY_DB_USERNAME:root}
    password: ${INVENTORY_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  public-key: ${JWT_PUBLIC_KEY}

logging:
  file:
    name: ${LOG_ROOT:../logs}/inventory-service.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROOT:../logs}/inventory-service.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
