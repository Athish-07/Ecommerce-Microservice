server:
  port: 8761

spring:
  application:
    name: service-registry
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

logging:
  file:
    name: ${LOG_ROOT:../logs}/service-registry.log
  level:
    root: INFO
    com.example: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [corr:%X{correlationId}] [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [corr:%X{correlationId}] [%thread] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROOT:../logs}/service-registry.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
